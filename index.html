<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>投票システム</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
  background: #111;
  color: white;
}

.container {
  width: 1200px;
  max-width: 95%;
}

/* カード */
.card {
  background: #1a1a1a;
  padding: 40px;
  border-radius: 20px;
  margin: auto;
  max-width: 900px;
  position: relative;
}

/* 戻る */
.back-btn {
  position: absolute;
  top: 15px;
  left: 15px;
  font-size: 22px;
  padding: 12px 18px;
  background: #333;
  color: white;
}

/* 見出し */
h2 {
  font-size: 40px;
}

/* 投票ボタン */
.vote-row {
  display: flex;
  justify-content: space-around;
  margin-top: 40px;
}

.circle-btn {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  font-size: 42px;
  font-weight: bold;
  border: none;
}

.agree {
  background: #ff3b3b;
}

.disagree {
  background: #2f6bff;
}

/* 欠席 */
.absent {
  width: 85%;
  font-size: 40px;
  padding: 35px;
  margin-top: 50px;
  background: #444;
  color: white;
}

/* 学籍番号 */
#studentId {
  font-size: 64px;
  font-weight: bold;
  text-align: center;
  margin: 20px 0;
}

#progress {
  text-align: center;
  font-size: 32px;
}

/* QRボタン */
.qr-btn {
  font-size: 26px;
  padding: 15px 25px;
  margin: 10px;
}
</style>
</head>

<body>
<div class="container">

<!-- 初期 -->
<div id="setup" class="card">
<h2>QR読み取り</h2>

<div id="reader" style="width:320px;margin:auto;"></div>

<br>

<button id="qrStartBtn" class="qr-btn" onclick="startQR()">QR開始</button>
<button id="rescanBtn" class="qr-btn" onclick="resetQR()" style="display:none;">再スキャン</button>

<p id="setupText"></p>

<button id="nextBtn" onclick="confirmSetup()" style="display:none;">次へ</button>
</div>

<!-- コード -->
<div id="codeInput" class="card" style="display:none;">
<h2>投票コード入力</h2>
<input id="voteCode" style="font-size:28px;">
<br><br>
<button onclick="startVoting()">開始</button>
</div>

<!-- 投票 -->
<div id="voteArea" class="card" style="display:none;">

<button class="back-btn" onclick="goBack()">戻る</button>

<h2 id="progress"></h2>
<h3 id="studentId"></h3>

<div class="vote-row">
  <button class="circle-btn agree" onclick="vote('賛成')">賛成</button>
  <button class="circle-btn disagree" onclick="vote('反対')">反対</button>
</div>

<button class="absent" onclick="vote('欠席')">欠席</button>

</div>

<!-- 結果 -->
<div id="resultArea" class="card" style="display:none;">
<h2>結果</h2>
<p id="resultText"></p>
<button onclick="submitData()">送信</button>
<div id="qrcode"></div>
</div>

</div>

<script>
let cls="", start=1, end=0;
let current, votes=[];
let agree=0, disagree=0, absent=0;

let html5QrCode;

// QR開始
function startQR(){
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      onScanSuccess(decodedText);
      html5QrCode.stop();
    }
  );
}

// 再スキャン
function resetQR(){
  document.getElementById("setupText").innerText="";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("rescanBtn").style.display="none";
  document.getElementById("qrStartBtn").style.display="inline-block";
}

// QR成功
function onScanSuccess(text){
  let data=JSON.parse(text);
  cls=data.class;
  start=data.start;
  end=data.end;

  document.getElementById("setupText").innerHTML =
    `読み取り成功<br>${cls} ${start}〜${end}`;

  document.getElementById("nextBtn").style.display="inline-block";

  // QR開始ボタン消す
  document.getElementById("qrStartBtn").style.display="none";

  // 再スキャン出す
  document.getElementById("rescanBtn").style.display="inline-block";
}

// 設定
function confirmSetup(){
  current=start;
  document.getElementById("setup").style.display="none";
  document.getElementById("codeInput").style.display="block";
}

// 学籍番号
function getStudentId(){
  let [g,c]=cls.split("-");
  return `${g}${c}${String(current).padStart(2,"0")}`;
}

// 開始
function startVoting(){
  let code=document.getElementById("voteCode").value;

  if(code.endsWith("help")){
    alert(`確認\n賛成:${agree} 反対:${disagree} 欠席:${absent}`);
    return;
  }

  document.getElementById("codeInput").style.display="none";
  document.getElementById("voteArea").style.display="block";
  update();
}

// 更新
function update(){
  document.getElementById("progress").innerText =
    `${current} / ${end}`;
  document.getElementById("studentId").innerText =
    getStudentId();
}

// 投票
function vote(type){
  votes.push(type);

  if(type==="賛成") agree++;
  if(type==="反対") disagree++;
  if(type==="欠席") absent++;

  current++;

  if(current>end){
    showResult();
  }else{
    update();
  }
}

// 戻る
function goBack(){
  if(current===start) return;
  if(!confirm("戻る？")) return;

  current--;
  let last=votes.pop();

  if(last==="賛成") agree--;
  if(last==="反対") disagree--;
  if(last==="欠席") absent--;

  update();
}

// 結果
function showResult(){
  document.getElementById("voteArea").style.display="none";
  document.getElementById("resultArea").style.display="block";

  document.getElementById("resultText").innerText =
    `賛成:${agree} 反対:${disagree} 欠席:${absent}`;
}

// 送信
function submitData(){
  fetch("URL",{
    method:"POST",
    body:JSON.stringify({
      class:cls,agree,disagree,absent
    })
  })
  .then(()=>alert("送信成功"))
  .catch(()=>{
    alert("失敗、QRで提出");
    new QRCode(document.getElementById("qrcode"),
      `${cls},${agree},${disagree},${absent}`);
  });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ヴォート</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 1200px;
  height: 95%;
}

.card {
  width: 100%;
  height: 100%;
  text-align: center;
  position: relative;
}

.big-text {
  font-size: 60px;
  font-weight: bold;
}

.qr-btn {
  font-size: 32px;
  padding: 20px 40px;
  margin: 20px;
}

#voteArea {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.vote-main {
  flex: 1;
  display: flex;
}

.vote-half {
  flex: 1;
  font-size: 70px;
  font-weight: bold;
  border: none;
  transition: 0.1s;
}

.vote-half:active {
  transform: scale(0.95);
  filter: brightness(0.8);
}

.agree { background:#ff3b3b; }
.disagree { background:#2f6bff; }

.absent {
  width:100%;
  height:130px;
  font-size:42px;
  background:#444;
  color:white;
  border:none;
}

.absent:active {
  transform: scale(0.95);
}

#studentId {
  font-size:64px;
  font-weight:bold;
}

#progress {
  font-size:32px;
}

.back-btn {
  position:absolute;
  top:15px;
  left:15px;
  font-size:28px;
  padding:15px;
  background:#ffcc00;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<!-- QR -->
<div id="setup" class="card">
<h2>QR読み取り</h2>
<div id="reader" style="width:300px;margin:auto;"></div>
<button id="qrStartBtn" class="qr-btn" onclick="startQR()">QR開始</button>

<div id="afterScan" style="display:none;">
  <div class="big-text" style="color:#0f0;">読み取り成功</div>
  <div id="scanResult" style="font-size:32px;margin-top:20px;"></div>

  <button class="qr-btn" onclick="confirmSetup()">次へ</button>
  <button class="qr-btn" onclick="resetQR()">再スキャン</button>
</div>
</div>

<!-- コード -->
<div id="codeInput" class="card" style="display:none;">
<h2>投票コード入力</h2>
<input id="voteCode" style="font-size:32px;">
<br><br>
<button class="qr-btn" onclick="startVoting()">開始</button>
</div>

<!-- 投票 -->
<div id="voteArea" class="card" style="display:none;">

<button class="back-btn" onclick="goBack()">戻る</button>

<div id="progress"></div>
<div id="studentId"></div>

<!-- ★ QR表示ここに移動 -->
<div id="child2Area" style="display:none; margin:10px 0;">
  <div style="display:flex; justify-content:center; align-items:center; gap:20px;">
    <div id="child2QR"></div>
    <div style="text-align:left;">
      <div style="font-size:20px; font-weight:bold;">
        評議委員別端末用QR
      </div>
      <div style="font-size:14px;">
        もう1人の評議委員がこのQRを読み込んでください
      </div>
    </div>
  </div>
</div>

<div class="vote-main">
  <button class="vote-half agree" onclick="vote('賛成')">賛成</button>
  <button class="vote-half disagree" onclick="vote('反対')">反対</button>
</div>

<button class="absent" onclick="vote('欠席')">欠席</button>

</div>

<!-- 結果 -->
<div id="resultArea" class="card" style="display:none;">
<h2>結果</h2>
<p id="resultText"></p>
<div id="qrcode"></div>
</div>

</div>

<script>
let cls="", start=1, end=0, total=0, role="";
let current, votes=[];
let agree=0, disagree=0, absent=0;
let ranges=[];
let presetCode="";
let html5QrCode;

// QR開始
function startQR(){
  document.getElementById("qrStartBtn").style.display="none";

  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text)=>{
      onScanSuccess(text);
      html5QrCode.stop();
    }
  );
}

// QR読み取り
function onScanSuccess(text){
  let data = JSON.parse(text);

  cls = data.class;
  total = data.total || 0;
  ranges = data.ranges || [];
  role = data.role || "child1";

  if(data.voteCode){
    presetCode = data.voteCode;
  }

  if(ranges.length){
    let r = ranges[0];
    start = r.start;
    end = r.end;
    role = r.role;
  } else {
    start = data.start;
    end = data.end;
  }

  document.getElementById("afterScan").style.display="block";

  if(role==="child2"){
    document.getElementById("scanResult").innerHTML =
      `<div style="font-size:60px;color:red;">
      ${start}番から投票です
      </div>
      <div>${cls} ${start}〜${end}</div>`;
  } else {
    document.getElementById("scanResult").innerText =
      `${cls} ${start}〜${end}`;
  }
}

// 次へ
function confirmSetup(){
  if(role==="child2"){
    if(!confirm(`${start}番からでOK？`)) return;

    if(presetCode){
      startVotingDirect();
      return;
    }
  }

  current=start;

  document.getElementById("setup").style.display="none";
  document.getElementById("codeInput").style.display="block";
}

// QR生成（ここが重要）
function generateChild2QR(code){

  if(!ranges.length) return;

  let data = {
    class: cls,
    total: total,
    start: ranges[1].start,
    end: ranges[1].end,
    role: "child2",
    voteCode: code
  };

  let qrText = JSON.stringify(data);

  document.getElementById("child2QR").innerHTML = "";
  new QRCode(document.getElementById("child2QR"), qrText);

  document.getElementById("child2Area").style.display="block";
}

// 投票開始（子機1）
function startVoting(){
  let code=document.getElementById("voteCode").value;

  if(role==="child1"){
    generateChild2QR(code);
  }

  current = start;

  document.getElementById("codeInput").style.display="none";
  document.getElementById("voteArea").style.display="flex";

  update();
}

// 子機2
function startVotingDirect(){
  current = start;

  document.getElementById("setup").style.display="none";
  document.getElementById("voteArea").style.display="flex";

  update();
}

// 更新
function update(){
  document.getElementById("progress").innerText =
    `${current} / ${end}`;
  document.getElementById("studentId").innerText =
    `${cls}${String(current).padStart(2,"0")}`;
}

// 投票
function vote(type){
  votes.push(type);

  if(type==="賛成") agree++;
  if(type==="反対") disagree++;
  if(type==="欠席") absent++;

  current++;

  if(current>end){
    showResult();
  }else{
    update();
  }
}

// 戻る
function goBack(){
  if(current===start) return;
  if(!confirm("戻る？")) return;

  current--;
  let last=votes.pop();

  if(last==="賛成") agree--;
  if(last==="反対") disagree--;
  if(last==="欠席") absent--;

  update();
}

// 結果
function showResult(){
  document.getElementById("voteArea").style.display="none";
  document.getElementById("resultArea").style.display="block";

  document.getElementById("resultText").innerText =
    `賛成:${agree} 反対:${disagree} 欠席:${absent}`;

  let code = `${cls}|${agree}|${disagree}|${absent}`;
  new QRCode(document.getElementById("qrcode"), code);
}
</script>

</body>
</html>

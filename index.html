<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Rösta│ルスタ1</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  font-family: sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 1200px;
  height: 95%;
}

.card {
  width: 100%;
  height: 100%;
  text-align: center;
  position: relative;
}

.big-text {
  font-size: 60px;
  font-weight: bold;
}

.qr-btn {
  font-size: 32px;
  padding: 20px 40px;
  margin: 20px;
}

#voteArea {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.vote-main {
  flex: 1;
  display: flex;
}

.vote-half {
  flex: 1;
  font-size: 70px;
  font-weight: bold;
  border: none;
  transition: 0.1s;
}

.vote-half:active {
  transform: scale(0.95);
  filter: brightness(0.8);
}

.agree { background:#ff3b3b; }
.disagree { background:#2f6bff; }

.absent {
  width:100%;
  height:130px;
  font-size:42px;
  background:#444;
  color:white;
  border:none;
}

.absent:active {
  transform: scale(0.95);
}

#studentId {
  font-size:64px;
  font-weight:bold;
}

#progress {
  font-size:32px;
}

.back-btn {
  position:absolute;
  top:15px;
  left:15px;
  font-size:28px;
  padding:15px;
  background:#ffcc00;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<!-- QR -->
<div id="setup" class="card">
<h2>QR読み取り</h2>
<div id="reader" style="width:300px;margin:auto;"></div>
<button id="qrStartBtn" class="qr-btn" onclick="startQR()">QR開始</button>

<div id="afterScan" style="display:none;">
  <div class="big-text" style="color:#0f0;">読み取り成功</div>
  <div id="scanResult" style="font-size:32px;margin-top:20px;"></div>

  <button class="qr-btn" onclick="confirmSetup()">次へ</button>
  <button class="qr-btn" onclick="resetQR()">再スキャン</button>
</div>
</div>

<!-- コード -->
<div id="codeInput" class="card" style="display:none;">
<h2>投票コード入力</h2>
<input id="voteCode" style="font-size:32px;">
<br><br>
<button class="qr-btn" onclick="startVoting()">開始</button>
</div>

<!-- 投票 -->
<div id="voteArea" class="card" style="display:none;">

<button class="back-btn" onclick="goBack()">戻る</button>

<div id="progress"></div>
<div id="studentId"></div>

<!-- 子機2QR -->
<div id="child2Area" style="display:none; margin:10px 0;">
  <div style="display:flex; justify-content:center; align-items:center; gap:20px;">
    
    <div id="child2QR"></div>

    <div style="text-align:left;">
      <div style="font-size:20px; font-weight:bold;">
        評議委員別端末用QR
      </div>
      <div style="font-size:14px;">
        もう1人の評議委員がこのQRを読み込んでください
      </div>
    </div>

  </div>

  <button class="qr-btn" onclick="startVoteAfterQR()">次へ（投票開始）</button>
</div>

<!-- 投票ボタン -->
<div class="vote-main" id="voteButtons" style="display:none;">
  <button class="vote-half agree" onclick="vote('賛成')">賛成</button>
  <button class="vote-half disagree" onclick="vote('反対')">反対</button>
</div>

<button class="absent" id="absentBtn" style="display:none;" onclick="vote('欠席')">欠席</button>

</div>

<!-- 結果 -->
<div id="resultArea" class="card" style="display:none;">
<h2>結果</h2>

<p id="resultText"></p>

<button id="mergeBtn" onclick="startMergeQR()">子機2読み取り</button>
<div id="mergeReader" style="width:300px;margin:auto;"></div>

</div>

</div>

<script>
let cls="", total=0, ranges=[], role="";
let start=1, end=0, current;
let votes=[];
let agree=0, disagree=0, absent=0;
let voteCodeGlobal="";
let html5QrCode;

// QR開始
function startQR(){
  document.getElementById("qrStartBtn").style.display="none";

  html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text)=>{
      onScanSuccess(text);
      html5QrCode.stop();
    }
  );
}

// QR読み取り
function onScanSuccess(text){

  // 子機2QR（軽量）
  if(text.includes("|")){
    let parts = text.split("|");

    cls = parts[0];
    start = Number(parts[1]);
    end = Number(parts[2]);
    voteCodeGlobal = parts[3];
    role = "child2";

  } else {
    let data = JSON.parse(text);

    cls = data.class;
    total = data.total || 0;
    ranges = data.ranges || [];
    role = data.role || "child1";

    let r = ranges[0];
    start = r.start;
    end = r.end;
    role = r.role;
  }

  document.getElementById("afterScan").style.display="block";

  if(role==="child2"){
    document.getElementById("scanResult").innerHTML =
      `<div style="font-size:60px;color:red;">
      ${start}番から投票です
      </div>
      <div>${cls} ${start}〜${end}</div>`;
  } else {
    document.getElementById("scanResult").innerText =
      `${cls} ${start}〜${end}`;
  }
}

// 次へ
function confirmSetup(){
  if(role==="child2"){
    if(!confirm(`${start}番からでOK？`)) return;
    startVotingDirect();
    return;
  }

  current=start;
  document.getElementById("setup").style.display="none";
  document.getElementById("codeInput").style.display="block";
}

// 子機2QR生成（軽量）
function generateChild2QR(code){
  let data = `${cls}|${ranges[1].start}|${ranges[1].end}|${code}`;

  document.getElementById("child2QR").innerHTML = "";
  new QRCode(document.getElementById("child2QR"), data);

  document.getElementById("child2Area").style.display="block";
}

// 投票開始（子機1）
function startVoting(){
  let code=document.getElementById("voteCode").value;

  voteCodeGlobal = code;

  generateChild2QR(code);

  document.getElementById("codeInput").style.display="none";
  document.getElementById("voteArea").style.display="flex";
}

// QR後開始
function startVoteAfterQR(){
  if(!confirm("QRを閉じて投票を開始しますか？")) return;

  current = start;
  document.getElementById("child2Area").style.display="none";
  showVotingUI();
}

// 子機2開始
function startVotingDirect(){
  current = start;

  document.getElementById("setup").style.display="none";
  document.getElementById("voteArea").style.display="flex";

  showVotingUI();
}

// UI表示
function showVotingUI(){
  document.getElementById("voteButtons").style.display="flex";
  document.getElementById("absentBtn").style.display="block";
  update();
}

// 更新
function update(){
  document.getElementById("progress").innerText =
    `${current} / ${end}`;

  let [g,c]=cls.split("-");
  document.getElementById("studentId").innerText =
    `${g}${c}${String(current).padStart(2,"0")}`;
}

// 投票
function vote(type){
  votes.push(type);

  if(type==="賛成") agree++;
  if(type==="反対") disagree++;
  if(type==="欠席") absent++;

  current++;

  if(current>end){
    showResult();
  }else{
    update();
  }
}

// 戻る
function goBack(){
  if(current===start) return;
  if(!confirm("戻る？")) return;

  current--;
  let last=votes.pop();

  if(last==="賛成") agree--;
  if(last==="反対") disagree--;
  if(last==="欠席") absent--;

  update();
}

// 結果
function showResult(){
  document.getElementById("voteArea").style.display="none";
  document.getElementById("resultArea").style.display="block";

  // 子機2はボタン消す
  if(role==="child2"){
    document.getElementById("mergeBtn").style.display="none";
  }

  document.getElementById("resultText").innerHTML =
    `<div style="font-size:60px;font-weight:bold;">合計</div>
     <div style="font-size:50px;">
     賛成:${agree}<br>
     反対:${disagree}<br>
     欠席:${absent}
     </div>`;
}

// 合体QR開始
function startMergeQR(){
  let qr = new Html5Qrcode("mergeReader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text)=>{
      mergeData(text);
      qr.stop();
    }
  );
}

// 合体処理
function mergeData(text){
  let parts = text.split("|");

  if(parts.length !== 5){
    alert("形式エラー");
    return;
  }

  let [cls2, code2, a, d, ab] = parts;

  if(cls2 !== cls){
    alert("クラス違う！");
    return;
  }

  if(code2 !== voteCodeGlobal){
    alert("投票コード違う！");
    return;
  }

  agree += Number(a);
  disagree += Number(d);
  absent += Number(ab);

  document.getElementById("resultText").innerHTML =
    `<div style="font-size:60px;font-weight:bold;">合計</div>
     <div style="font-size:50px;">
     賛成:${agree}<br>
     反対:${disagree}<br>
     欠席:${absent}
     </div>`;

  alert("合体成功！");
}
</script>

</body>
</html>
